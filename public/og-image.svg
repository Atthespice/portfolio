<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0C0C0C"/>
      <stop offset="55%" stop-color="#14151B"/>
      <stop offset="100%" stop-color="#0C0C0C"/>
    </linearGradient>
    <linearGradient id="silver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#646973"/>
      <stop offset="100%" stop-color="#BBCCD7"/>
    </linearGradient>
    <radialGradient id="glowY" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F5B921" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#F5B921" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3D7BFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#3D7BFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="120" cy="120" r="260" fill="url(#glowY)"/>
  <circle cx="1080" cy="520" r="280" fill="url(#glowB)"/>

  <g transform="translate(90,215)">
    <circle cx="90" cy="90" r="84" fill="#0C0C0C" stroke="#F5B921" stroke-width="3" stroke-dasharray="6 7"/>
    <circle cx="90" cy="90" r="60" fill="none" stroke="#3D7BFF" stroke-width="2" opacity="0.6"/>
    <text x="90" y="112" text-anchor="middle" font-family="Kanit, Arial, sans-serif" font-weight="700" font-size="64" fill="#BBCCD7">RM</text>
  </g>

  <text x="330" y="300" font-family="Kanit, Arial, sans-serif" font-weight="900" font-size="72" fill="url(#silver)">HI, I'M <tspan fill="#F5B921">RICH</tspan></text>
  <text x="330" y="360" font-family="Kanit, Arial, sans-serif" font-weight="400" font-size="28" fill="#D7E2EA">Full-stack developer &amp; creative technologist</text>
  <text x="330" y="400" font-family="Kanit, Arial, sans-serif" font-weight="400" font-size="28" fill="#D7E2EA">building software, networks, and brands in Nairobi</text>
</svg>
